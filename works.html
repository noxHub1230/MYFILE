<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="./js/lang_detect.js"></script>
    <script src="./js/lang_switcher.js"></script>
    <link rel="stylesheet" href="./css/navBurger.css" />
    <link rel="stylesheet" href="./css/works.css" />
    <link rel="stylesheet" href="./css/loading.css" />
    <link rel="stylesheet" href="./css/navLang.css" />
    <link rel="icon" href="./assets/webicon.ico" type="image/x-icon" />
    <script src="./js/loading.js" defer></script>
    <title>MYFILE-Works</title>
    <!-- Bootstrap CSS（僅保留 collapse 功能所需） -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- GSAP + ScrollTrigger -->
    <script
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"
      defer
    ></script>
    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
  </head>
  <body>
    <div class="BGcontainer">
      <div class="renderLayer"></div>
      <img
        class="BGvideo"
        src="https://images.unsplash.com/photo-1735192395661-9fef6e2ec447?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="background"
      />

      <!-- ── 導覽列 ── -->
      <div class="navigator">
        <div class="navTitle">
          <h2 id="nav-site-title"></h2>
        </div>
        <div class="navArea" id="works-nav"></div>
      </div>
      <div class="navRenderLayer"></div>

      <!-- ── 主內容 ── -->
      <div class="mainContainer">
        <!-- 頁面標題區塊 -->
        <div class="pageHeader">
          <div class="pageHeader__eyebrow">Portfolio</div>
          <h1 class="pageHeader__title" id="works-page-title"></h1>
          <div class="pageHeader__line"></div>
        </div>

        <!-- 專案列表（由 JS 動態注入） -->
        <div class="projectList" id="works-content"></div>
      </div>
    </div>
    <script src="./js/nav.js"></script>
    <script>
      /**
       * works.html — 主腳本
       * 負責渲染導覽列、頁面標題，以及以折疊式卡片（collapse 樣式）
       * 展示每個專案內容。動畫全部交由 GSAP 控制。
       */
      loadData(({ nav, works }) => {
        /* ── 導覽列 ──────────────────────────────────────── */
        renderInnerNav(nav, "works", "works-nav");

        /* ── 頁面標題 ──────────────────────────────────────── */
        document.getElementById("works-page-title").textContent =
          works.pageTitle;

        /* ── 專案列表渲染 ──────────────────────────────────── */
        const contentEl = document.getElementById("works-content");

        works.projects.forEach((project, projectIndex) => {
          /* 產生不重複的 ID，供 Bootstrap collapse 使用 */
          const collapseId = `project-body-${projectIndex}`;

          /* ── 卡片外殼 ── */
          const card = document.createElement("div");
          card.className = "projectCard";
          card.dataset.index = projectIndex;

          /* ── 卡片標題（觸發展開/收合） ── */
          const imgSrc = [
            "./assets/MYFILE.png",
            "./assets/Toyhouse.png",
            "./assets/Ancientwood.png",
          ];
          const cardHeader = document.createElement("div");
          cardHeader.className = "projectCard__header";
          cardHeader.setAttribute("data-bs-toggle", "collapse");
          cardHeader.setAttribute("data-bs-target", `#${collapseId}`);
          cardHeader.setAttribute("aria-expanded", "false");
          cardHeader.setAttribute("aria-controls", collapseId);
          cardHeader.innerHTML = `
                <img src=${imgSrc[projectIndex]} style="width:5rem;aspect-ratio:1/1;"/>
                <h2 class="projectCard__title">${project.heading}</h2>
                <span class="projectCard__arrow">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" class="arrowIcon">
                        <path d="M3 6L8 11L13 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
            `;

          /* ── 可折疊區塊 ── */
          const collapseDiv = document.createElement("div");
          collapseDiv.className = "collapse projectCard__body";
          collapseDiv.id = collapseId;

          /* ── 內容渲染：依 item 種類分別建立元素 ── */
          const inner = document.createElement("div");
          inner.className = "projectCard__inner";

          project.items.forEach((item) => {
            const row = document.createElement("div");
            row.className = "infoRow";

            /* 標籤欄 */
            const labelEl = document.createElement("div");
            labelEl.className = "infoRow__label";
            labelEl.textContent = item.label;
            row.appendChild(labelEl);

            /* 值欄 */
            const valueEl = document.createElement("div");
            valueEl.className = "infoRow__value";

            if (item.palette) {
              /* 色票配色 / カラーパレット */
              const palette = document.createElement("div");
              palette.className = "colorPalette";
              item.palette.forEach((swatch) => {
                const sDiv = document.createElement("div");
                sDiv.className = "colorSwatch";
                sDiv.id = swatch.id;
                sDiv.style.background = swatch.color;
                const label = document.createElement("span");
                label.className = "colorSwatch__label";
                label.textContent = swatch.id;
                sDiv.appendChild(label);
                palette.appendChild(sDiv);
              });
              valueEl.appendChild(palette);
            } else if (item.state) {
              const state = document.createElement("div");
              state.className = "projectState";
              state.textContent = item.state[0];
              state.style.background = item.state[1];
              state.style.textAlign = "center";
              state.style.width = "fit-content";
              state.style.height = "fit-content";
              state.style.padding = "0.25rem";
              state.style.borderRadius = "1rem";
              valueEl.appendChild(state);
              const demoLink = document.createElement("a");
              demoLink.style.color = "#affcff";
              demoLink.className = "demoLink";
              demoLink.target = "_blank";
              demoLink.innerHTML = `DEMO <i class="bi bi-box-arrow-up-right"></i>`;
              demoLink.href = item.state[2];
              valueEl.appendChild(demoLink);
            } else if (item.list) {
              /* 製作疑難 / 制作上の課題 */
              const list = document.createElement("ul");
              list.className = "challengeList";
              item.list.forEach((child) => {
                const li = document.createElement("li");
                li.className = "challengeList__item";
                li.innerHTML = `
                            <span class="challenge__problem">${child.text}</span>
                            <span class="challenge__arrow">→</span>
                            <span class="challenge__solution">${child.solution}</span>
                            ${child.note ? `<span class="challenge__note">${child.note}</span>` : ""}
                        `;
                list.appendChild(li);
              });
              valueEl.appendChild(list);
            } else if (item.link) {
              const ul = document.createElement("ul");
              const texts = [].concat(item.link.text);
              const hrefs = [].concat(item.link.href);
              texts.forEach((text, i) => {
                const li = document.createElement("li");
                const a = document.createElement("a");
                a.href = hrefs[i];
                a.textContent = text;
                a.target = "_blank";
                a.className = "infoLink";

                // 有 note 才加 tooltip
                if (item.link.note && i === 0) {
                  const wrapper = document.createElement("span");
                  wrapper.style.position = "relative";
                  wrapper.style.display = "inline-block";

                  const icon = document.createElement("span");
                  icon.textContent = " ⓘ";
                  icon.style.cssText = `
        cursor: pointer;
        opacity: 0.5;
        font-size: 0.85em;
        user-select: none;
      `;

                  const tip = document.createElement("span");
                  tip.textContent = item.link.note;
                  tip.style.cssText = `
        visibility: hidden;
        opacity: 0;
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(8, 26, 107, 0.95);
        color: #affcff;
        font-family: 'Zen Maru Gothic', sans-serif;
        font-size: 0.78rem;
        line-height: 1.5;
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid rgba(175,252,255,0.25);
        white-space: nowrap;
        max-width: 260px;
        white-space: normal;
        pointer-events: none;
        transition: opacity 0.2s ease, visibility 0.2s ease;
        z-index: 100;
        box-shadow: 0 0 10px rgba(175,252,255,0.1);
      `;

                  const show = () => {
                    tip.style.visibility = "visible";
                    tip.style.opacity = "1";
                  };
                  const hide = () => {
                    tip.style.visibility = "hidden";
                    tip.style.opacity = "0";
                  };

                  // 桌機：hover；行動端：toggle
                  icon.addEventListener("mouseenter", show);
                  icon.addEventListener("mouseleave", hide);
                  icon.addEventListener("click", (e) => {
                    e.preventDefault();
                    tip.style.visibility === "visible" ? hide() : show();
                  });

                  wrapper.appendChild(a);
                  wrapper.appendChild(icon);
                  wrapper.appendChild(tip);
                  li.appendChild(wrapper);
                } else {
                  li.appendChild(a);
                }

                ul.appendChild(li);
              });
              valueEl.appendChild(ul);
            } else if (item.description) {
              /* 設計理念 / アップデート概要 */
              const text = document.createElement("div");
              text.className = "description";
              text.textContent = item.description.trim();
              text.style.whiteSpace = "pre-line";
              valueEl.appendChild(text);
            } else if (item.links) {
              /* 多連結列表 / 素材使用 */
              const ul = document.createElement("ul");
              ul.className = "linkList";
              item.links.forEach((link) => {
                const li = document.createElement("li");
                const a = document.createElement("a");
                a.href = link.href;
                a.textContent = link.text;
                a.target = "_blank";
                a.className = "infoLink";
                li.appendChild(a);
                ul.appendChild(li);
              });
              valueEl.appendChild(ul);
            } else {
              /* 一般文字項目 */
              valueEl.textContent = item.value ?? "";
              if (item.note) {
                const note = document.createElement("span");
                note.className = "infoNote";
                note.textContent = `（${item.note}）`;
                valueEl.appendChild(note);
              }
            }

            row.appendChild(valueEl);
            inner.appendChild(row);
          });

          collapseDiv.appendChild(inner);
          card.appendChild(cardHeader);
          card.appendChild(collapseDiv);
          contentEl.appendChild(card);
        });

        /* ── GSAP：頁面初始進場動畫 ──────────────────────── */
        gsap.registerPlugin(ScrollTrigger);

        gsap.from(".pageHeader__eyebrow", {
          opacity: 0,
          y: -20,
          duration: 0.6,
          ease: "power2.out",
          delay: 0.2,
        });
        gsap.from(".pageHeader__title", {
          opacity: 0,
          y: -30,
          duration: 0.7,
          ease: "power2.out",
          delay: 0.4,
        });
        gsap.from(".pageHeader__line", {
          scaleX: 0,
          transformOrigin: "left center",
          duration: 0.9,
          ease: "power3.out",
          delay: 0.7,
        });

        /* 卡片依序錯開進場 */
        gsap.from(".projectCard", {
          opacity: 0,
          y: 40,
          duration: 0.65,
          ease: "power2.out",
          stagger: 0.12,
          delay: 0.9,
        });

        /* ── GSAP：折疊箭頭旋轉微互動 ──────────────────── */
        document.querySelectorAll(".projectCard__header").forEach((header) => {
          const arrow = header.querySelector(".arrowIcon");
          const collapseTargetId = header.getAttribute("data-bs-target");
          const collapseEl = document.querySelector(collapseTargetId);

          /* 已展開的項目箭頭先轉 180° */
          if (collapseEl && collapseEl.classList.contains("show")) {
            gsap.set(arrow, { rotation: 180 });
          }

          collapseEl.addEventListener("show.bs.collapse", () => {
            document
              .querySelectorAll(".projectCard__body.show")
              .forEach((openEl) => {
                if (openEl !== collapseEl) {
                  bootstrap.Collapse.getOrCreateInstance(openEl).hide();
                }
              });
            gsap.to(arrow, {
              rotation: 180,
              duration: 0.35,
              ease: "power2.inOut",
            });
          });
          collapseEl.addEventListener("hide.bs.collapse", () => {
            gsap.to(arrow, {
              rotation: 0,
              duration: 0.35,
              ease: "power2.inOut",
            });
          });

          /* 標題 hover：文字微位移 */
          const title = header.querySelector(".projectCard__title");
          header.addEventListener("mouseenter", () => {
            gsap.to(title, { x: 50, duration: 0.25, ease: "power1.out" });
          });
          header.addEventListener("mouseleave", () => {
            gsap.to(title, { x: 0, duration: 0.25, ease: "power1.out" });
          });
        });

        /* ── GSAP：色票 hover 展開動畫 ──────────────────── */
        document.querySelectorAll(".colorSwatch").forEach((swatch) => {
          const labelSpan = swatch.querySelector(".colorSwatch__label");
          swatch.addEventListener("mouseenter", () => {
            gsap.to(swatch, { height: 52, duration: 0.3, ease: "power2.out" });
            gsap.to(labelSpan, {
              opacity: 1,
              duration: 0.25,
              ease: "power1.out",
            });
          });
          swatch.addEventListener("mouseleave", () => {
            gsap.to(swatch, {
              height: 18,
              duration: 0.3,
              ease: "power2.inOut",
            });
            gsap.to(labelSpan, {
              opacity: 0,
              duration: 0.2,
              ease: "power1.in",
            });
          });
        });

        /* ── GSAP：預設展開卡片內的 infoRow 依序進場 ── */
        document
          .querySelectorAll(".projectCard__body.show .infoRow")
          .forEach((row, i) => {
            gsap.from(row, {
              opacity: 0,
              x: -16,
              duration: 0.45,
              ease: "power2.out",
              delay: 1.1 + i * 0.07,
            });
          });
      });
    </script>
  </body>
</html>
