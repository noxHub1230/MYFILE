<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/contact.css" rel="stylesheet" />
    <link href="./css/loading.css" rel="stylesheet" />
    <link rel="icon" href="./assets/webicon.ico" type="image/x-icon" />
    <script src="./js/loading.js" defer></script>
    <script src="./js/carousel_contact.js" defer></script>
    <title>MYFILE-Contact</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- GSAP + ScrollTrigger -->
    <script
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"
      defer
    ></script>
    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
  </head>
  <body>
    <div class="BGcontainer">
      <div class="renderLayer"></div>
      <video autoplay muted loop preload="auto" class="BGvideo">
        <source src="./assets/contact_BG.mp4" type="video/mp4" />
      </video>
      <div class="navigator">
        <div class="navTitle">
          <h2 id="nav-site-title"></h2>
        </div>
        <div class="navArea" id="contact-nav"></div>
      </div>
      <div class="navRenderLayer"></div>
      <div class="mainContainer">
        <div class="leftArea">
          <div class="titleDiv">
            <div class="title__eyebrow">Contact</div>
            <h1 class="title" id="contact-page-title"></h1>
          </div>
          <hr class="line" />
          <div class="content" id="contact-content"></div>
        </div>
        <div class="rightArea"></div>
      </div>
    </div>
    <script src="./js/lang_switcher.js"></script>
    <script src="./js/nav.js"></script>
    <script>
      loadData(({ nav, contact }) => {
        // 導覽列
        renderInnerNav(nav, "contact", "contact-nav");

        // 頁面標題
        document.getElementById("contact-page-title").textContent =
          contact.pageTitle;

        // 內容區塊
        const contentEl = document.getElementById("contact-content");

        contact.sections.forEach((section) => {
          const titleDiv = document.createElement("div");
          titleDiv.className = "contentTitle";
          titleDiv.innerHTML = `<h2><span style="font-size:0.8em"> ► </span>${section.heading}</h2>`;
          contentEl.appendChild(titleDiv);

          const textDiv = document.createElement("div");
          textDiv.className = "contentText";
          const ul = document.createElement("ul");

          if (section.type === "links") {
            section.items.forEach((item) => {
              const li = document.createElement("li");
              const a = document.createElement("a");
              a.href = item.href;
              a.target = "_blank";
              if (item.note) {
                a.textContent = item.text.replace(item.note, "");
                const noteSpan = document.createElement("span");
                noteSpan.style.opacity = "0.5";
                noteSpan.textContent = item.note;
                a.appendChild(noteSpan);
              } else {
                a.textContent = item.text;
              }
              li.appendChild(a);
              ul.appendChild(li);
            });
          } else if (section.type === "list") {
            section.items.forEach((item) => {
              const li = document.createElement("li");
              li.textContent = item.label + "：" + item.value;
              li.style.whiteSpace = "pre-line";
              ul.appendChild(li);
            });
          }

          textDiv.appendChild(ul);
          contentEl.appendChild(textDiv);
        });
      });
    </script>
  </body>
</html>
