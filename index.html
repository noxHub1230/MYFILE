<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/home.css" rel="stylesheet" />
    <link href="./css/loading.css" rel="stylesheet">
    <script src="./js/loading.js" defer></script>
    <link rel="icon" href="./assets/webicon.ico" type="image/x-icon">
    <title>MYFILE</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- GSAP + ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js" defer></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  </head>
  <body>
    <div class="videoContainer">
      <div class="renderLayer"></div>
      <video src="./assets/home_BG.mp4" type="video/mp4" loop autoplay muted preload="auto" class="BGvideo">
      </video>
      <div class="mainContainer">
        <div class="titleArea">
          <h1 id="home-title"></h1>
          <h4 id="home-subtitle"></h4>
        </div>
        <hr class="line" />
        <div class="navArea" id="home-nav"></div>
      </div>
      <div class="mainContainerBG"></div>
    </div>
    <script src="./js/lang_switcher.js"></script>
    <script src="./js/nav.js"></script>
    <script>
      loadData(({ home, nav }) => {
        document.getElementById("home-title").textContent    = home.title;
        document.getElementById("home-subtitle").textContent = home.subtitle;

        renderHomeNav(nav);
      });
    </script>
  </body>
</html>
