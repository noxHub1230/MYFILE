<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="./js/lang_detect.js"></script>
    <script src="./js/lang_switcher.js"></script>
    <link rel="stylesheet" href="./css/navBurger.css" />
    <link href="./css/intro.css" rel="stylesheet" />
    <link href="./css/loading.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/navLang.css" />
    <link rel="icon" href="./assets/webicon.ico" type="image/x-icon" />
    <script src="./js/loading.js" defer></script>
    <script src="./js/carousel_intro.js" defer></script>
    <title>MYFILE-Intro</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- GSAP + ScrollTrigger -->
    <script
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"
      defer
    ></script>
    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>
  </head>
  <body>
    <div class="BGcontainer">
      <div class="renderLayer"></div>
      <img
        class="BGvideo"
        src="https://images.unsplash.com/photo-1654718752855-5ae7b036978f?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        alt="background"
      />

      <div class="navigator">
        <div class="navTitle">
          <h2 id="nav-site-title"></h2>
        </div>
        <div class="navArea" id="intro-nav"></div>
      </div>
      <div class="navRenderLayer"></div>

      <!-- Hero Section: full viewport, centered title -->
      <section class="hero">
        <div class="hero-inner">
          <div class="hero-deco-line hero-deco-line--top reveal"></div>
          <h1 class="hero-title reveal" id="intro-page-title"></h1>
          <div class="hero-deco-line hero-deco-line--bottom reveal"></div>
        </div>
        <div class="scroll-hint reveal">
          <span class="scroll-hint-text">scroll</span>
          <span class="scroll-hint-line"></span>
        </div>
      </section>

      <!-- Vertical scroll content -->
      <main class="mainContainer" id="intro-content">
        <!-- Content sections and showcase images injected by JS -->
      </main>
    </div>
    <script src="./js/nav.js"></script>
    <script>
      loadData(({ nav, intro }) => {
        // Nav
        renderInnerNav(nav, "intro", "intro-nav");

        // Hero title
        document.getElementById("intro-page-title").textContent =
          intro.pageTitle;

        const contentEl = document.getElementById("intro-content");

        // Showcase images (reuse original carousel images + leftArea bg)
        const showcaseImages = [
          { url: "./assets/introImage_1.png", ratio: "1627/662" },
          { url: "./assets/introImage_2.png", ratio: "875/389" },
          { url: "./assets/introImage_3.png", ratio: "3651/5861" },
        ];

        intro.sections.forEach((section, idx) => {
          // ── Content Section ──
          const sectionEl = document.createElement("section");
          sectionEl.className = "content-section reveal";

          // Heading
          const headingWrap = document.createElement("div");
          headingWrap.className = "section-heading";
          headingWrap.innerHTML = `<span class="section-marker">\u2015</span><h2>${section.heading}</h2>`;
          sectionEl.appendChild(headingWrap);

          // Body
          const bodyEl = document.createElement("div");
          bodyEl.className = "section-body";

          if (section.type === "list") {
            const ul = document.createElement("ul");
            section.items.forEach((item) => {
              const li = document.createElement("li");
              li.textContent = item.text;
              if (item.children) {
                const subUl = document.createElement("ul");
                item.children.forEach((child) => {
                  const subLi = document.createElement("li");
                  subLi.textContent = child.text;
                  if (child.note) {
                    const noteSpan = document.createElement("span");
                    noteSpan.className = "note";
                    noteSpan.textContent = " " + child.note;
                    subLi.appendChild(noteSpan);
                  }
                  subUl.appendChild(subLi);
                });
                li.appendChild(subUl);
              }
              ul.appendChild(li);
            });
            bodyEl.appendChild(ul);
          } else if (section.type === "paragraph") {
            const p = document.createElement("p");
            p.innerHTML = section.lines;
            p.style.whiteSpace = "pre-line";
            bodyEl.appendChild(p);
          }

          sectionEl.appendChild(bodyEl);
          contentEl.appendChild(sectionEl);

          // ── Showcase image after each section ──
          if (idx < showcaseImages.length) {
            const imgData = showcaseImages[idx];
            const imgSection = document.createElement("div");
            imgSection.className =
              "showcase " +
              (idx % 2 === 0 ? "showcase--right" : "showcase--left");

            const imgEl = document.createElement("div");
            imgEl.className = "showcase-image";
            imgEl.style.backgroundImage = `url(${imgData.url})`;
            imgEl.style.aspectRatio = imgData.ratio;
            imgEl.setAttribute("data-parallax", "");
            if (idx === 0) imgEl.id = "selfBanner";
            imgSection.appendChild(imgEl);

            contentEl.appendChild(imgSection);
          }
        });

        // Extra images if more images than sections
        for (let i = intro.sections.length; i < showcaseImages.length; i++) {
          const imgData = showcaseImages[i];
          const imgSection = document.createElement("div");
          imgSection.className =
            "showcase " + (i % 2 === 0 ? "showcase--right" : "showcase--left");

          const imgEl = document.createElement("div");
          imgEl.className = "showcase-image";
          imgEl.style.backgroundImage = `url(${imgData.url})`;
          imgEl.style.aspectRatio = imgData.ratio;
          imgEl.setAttribute("data-parallax", "");
          imgSection.appendChild(imgEl);

          contentEl.appendChild(imgSection);
        }

        // Init scroll-reveal after DOM is built
        if (typeof initScrollReveal === "function") initScrollReveal();
        if (typeof initShowcaseGSAP === "function") initShowcaseGSAP();
      });
    </script>
  </body>
</html>
